<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather Dashboard</title>
    <link rel="stylesheet" href="weather-styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header class="header">
            <div class="header-content">
                <h1><i class="fas fa-cloud"></i> Weather Dashboard</h1>
                <p>Real-time weather information from around the world</p>
            </div>
        </header>

        <!-- Search Section -->
        <section class="search-section">
            <div class="search-container">
                <input 
                    type="text" 
                    id="searchInput" 
                    class="search-input" 
                    placeholder="Search city or coordinates (lat,lon)..."
                    autocomplete="off"
                >
                <button class="search-btn" id="searchBtn">
                    <i class="fas fa-search"></i> Search
                </button>
                <button class="location-btn" id="locationBtn" title="Use current location">
                    <i class="fas fa-location-dot"></i> My Location
                </button>
            </div>
            <div class="search-suggestions" id="suggestions"></div>
        </section>

        <!-- Loading State -->
        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p>Loading weather data...</p>
        </div>

        <!-- Error State -->
        <div class="error-message" id="errorMessage"></div>

        <!-- Current Weather Section -->
        <section class="current-weather" id="currentWeather">
            <div class="weather-main">
                <div class="location-info">
                    <h2 id="cityName"></h2>
                    <p id="weatherDate"></p>
                </div>
                <div class="weather-icon-large">
                    <img id="weatherIcon" src="" alt="Weather">
                </div>
                <div class="temperature-display">
                    <span id="temperature" class="temp"></span>
                    <span class="degree">°</span>
                    <span id="tempUnit" class="unit">C</span>
                </div>
                <p id="weatherDescription" class="weather-desc"></p>
            </div>

            <div class="weather-details">
                <div class="detail-item">
                    <i class="fas fa-droplet"></i>
                    <div>
                        <span class="label">Humidity</span>
                        <span id="humidity" class="value">--%</span>
                    </div>
                </div>
                <div class="detail-item">
                    <i class="fas fa-wind"></i>
                    <div>
                        <span class="label">Wind Speed</span>
                        <span id="windSpeed" class="value">-- m/s</span>
                    </div>
                </div>
                <div class="detail-item">
                    <i class="fas fa-gauge"></i>
                    <div>
                        <span class="label">Pressure</span>
                        <span id="pressure" class="value">-- mb</span>
                    </div>
                </div>
                <div class="detail-item">
                    <i class="fas fa-eye"></i>
                    <div>
                        <span class="label">Visibility</span>
                        <span id="visibility" class="value">-- km</span>
                    </div>
                </div>
                <div class="detail-item">
                    <i class="fas fa-gauge-high"></i>
                    <div>
                        <span class="label">Feels Like</span>
                        <span id="feelsLike" class="value">--°</span>
                    </div>
                </div>
                <div class="detail-item">
                    <i class="fas fa-cloud"></i>
                    <div>
                        <span class="label">Cloud Cover</span>
                        <span id="cloudCover" class="value">--%</span>
                    </div>
                </div>
            </div>
        </section>

        <!-- Forecast Section -->
        <section class="forecast-section">
            <div class="forecast-header">
                <h3>5-Day Forecast</h3>
                <div class="forecast-tabs">
                    <button class="tab-btn active" data-tab="hourly">Hourly</button>
                    <button class="tab-btn" data-tab="daily">Daily</button>
                </div>
            </div>

            <!-- Hourly Forecast -->
            <div class="forecast-container" id="hourlyForecast">
                <!-- Hourly cards will be inserted here -->
            </div>

            <!-- Daily Forecast -->
            <div class="forecast-container daily-forecast" id="dailyForecast">
                <!-- Daily cards will be inserted here -->
            </div>
        </section>

        <!-- Recent Searches -->
        <section class="recent-searches" id="recentSearchesSection">
            <h3>Recent Searches</h3>
            <div class="search-history" id="searchHistory"></div>
        </section>

        <!-- Temperature Unit Toggle -->
        <div class="unit-toggle">
            <button class="unit-btn active" data-unit="metric" data-symbol="C">°C</button>
            <button class="unit-btn" data-unit="imperial" data-symbol="F">°F</button>
        </div>
    </div>

    <script src="weather-script.js"></script>
</body>
</html>
